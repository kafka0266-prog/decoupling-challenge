<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デカップリングチャレンジ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, #14532d 0%, transparent 55%),
                  radial-gradient(ellipse at 70% 80%, #052e16 0%, transparent 55%),
                  #0a1510;
      color: #fff;
      user-select: none;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 8px 20px;
      background: rgba(0,0,0,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
    }
    header h1 { font-size: 1rem; font-weight: 700; color: #fbbf24; letter-spacing: 0.1em; text-shadow: 0 0 14px rgba(251,191,36,0.4); }
    .chip { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; color: #a1a1aa; }
    .chip b { color: #fbbf24; }

    /* ── Layout ── */
    .game { max-width: 1000px; margin: 0 auto; padding: 12px 16px 20px; display: flex; flex-direction: column; gap: 12px; }

    /* ── Player stats ── */
    .players { display: flex; gap: 10px; justify-content: center; }
    .p-card { background: rgba(0,0,0,0.45); border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 10px 18px; text-align: center; min-width: 130px; backdrop-filter: blur(6px); }
    .p-card.you { border-color: rgba(74,222,128,0.45); box-shadow: 0 0 16px rgba(74,222,128,0.1); }
    .p-card.dead { opacity: 0.3; }
    .p-name { font-weight: 700; font-size: 0.8rem; margin-bottom: 8px; color: #d4d4d8; }
    .p-card.you .p-name { color: #4ade80; }
    .p-stats { display: flex; justify-content: center; gap: 18px; }
    .p-stat .label { font-size: 0.58rem; color: #52525b; margin-bottom: 2px; }
    .p-stat .val { font-size: 1.5rem; font-weight: 800; line-height: 1; }

    /* ── Board center ── */
    .board-center { display: flex; align-items: center; justify-content: center; gap: 28px; flex-wrap: wrap; }

    /* ── Card base ── */
    .card {
      width: 120px; height: 168px;
      border-radius: 12px;
      position: relative;
      display: flex; flex-direction: column;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 2px 5px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.09);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      flex-shrink: 0;
    }

    /* Header with gradient + shine overlay */
    .card-header {
      flex-shrink: 0; padding: 5px 7px 4px;
      display: flex; flex-direction: column; gap: 2px;
      position: relative;
    }
    .card-header::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 42%; background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
      pointer-events: none; border-radius: 11px 11px 0 0;
    }
    .card-header .c-name {
      font-size: 0.6rem; font-weight: 800; color: #fff;
      line-height: 1.2; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      position: relative; z-index: 1;
    }
    .header-sub {
      display: flex; align-items: center; gap: 4px;
      position: relative; z-index: 1;
    }
    .header-cat {
      font-size: 0.42rem; color: rgba(255,255,255,0.8);
      font-weight: 600; letter-spacing: 0.06em;
    }
    .header-sub-tag {
      font-size: 0.37rem; color: rgba(255,255,255,0.62);
      background: rgba(0,0,0,0.28); padding: 1px 4px;
      border-radius: 3px; border: 0.5px solid rgba(255,255,255,0.2);
    }

    /* Art area with inner frame */
    .card-art {
      flex-shrink: 0; height: 52px;
      overflow: hidden; display: flex;
      align-items: center; justify-content: center;
      position: relative;
    }
    .card-art::after {
      content: ''; position: absolute; inset: 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(0,0,0,0.22);
      pointer-events: none;
    }
    .card-art svg { width: 100%; height: 100%; }

    /* Card body with description text */
    .card-body {
      flex: 1; padding: 4px 6px 3px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .card-desc {
      font-size: 0.47rem; line-height: 1.55;
      color: rgba(255,255,255,0.55);
      display: -webkit-box;
      -webkit-line-clamp: 4; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .earth-effect {
      font-size: 0.58rem; font-weight: 700;
      color: rgba(255,255,255,0.9); text-align: center;
      display: flex; align-items: center; justify-content: center;
      flex: 1; line-height: 1.4;
    }

    /* Stats bar – stat-block layout */
    .card-stats {
      flex-shrink: 0; display: flex; align-items: stretch;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .stat-block {
      flex: 1; text-align: center;
      padding: 3px 2px 4px; line-height: 1;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .stat-label {
      font-size: 0.4rem; font-weight: 700;
      color: rgba(255,255,255,0.45); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .stat-val {
      font-size: 0.82rem; font-weight: 900;
      font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
    }
    .stat-divider { width: 1px; background: rgba(255,255,255,0.1); align-self: stretch; }
    .stat-pos { color: #4ade80; } .stat-neg { color: #f87171; } .stat-zero { color: #6b7280; }
    .stat-co2-pos { color: #f87171; } .stat-co2-neg { color: #60a5fa; }

    /* Category themes – rich 3-stop gradient headers */
    .card.c-red { background: linear-gradient(170deg,#3d0a0a,#1c0404); border-color: rgba(239,68,68,0.35); }
    .card.c-red .card-header { background: linear-gradient(160deg,#f87171 0%,#dc2626 52%,#991b1b 100%); border-top: 2px solid rgba(252,165,165,0.6); border-bottom: 1px solid rgba(127,29,29,0.55); }
    .card.c-red .card-art { background: linear-gradient(165deg,#3d0f0f,#1c0606); }
    .card.c-red .card-body { border-left: 2px solid rgba(220,38,38,0.22); }
    .card.c-red .card-stats { background: rgba(239,68,68,0.08); }

    .card.c-blue { background: linear-gradient(170deg,#0d1e45,#060e22); border-color: rgba(59,130,246,0.35); }
    .card.c-blue .card-header { background: linear-gradient(160deg,#60a5fa 0%,#2563eb 52%,#1539b0 100%); border-top: 2px solid rgba(147,197,253,0.6); border-bottom: 1px solid rgba(15,40,155,0.55); }
    .card.c-blue .card-art { background: linear-gradient(165deg,#0c1f45,#060e22); }
    .card.c-blue .card-body { border-left: 2px solid rgba(37,99,235,0.22); }
    .card.c-blue .card-stats { background: rgba(59,130,246,0.08); }

    .card.c-green { background: linear-gradient(170deg,#041f0e,#010e06); border-color: rgba(34,197,94,0.35); }
    .card.c-green .card-header { background: linear-gradient(160deg,#4ade80 0%,#16a34a 52%,#0f6130 100%); border-top: 2px solid rgba(134,239,172,0.6); border-bottom: 1px solid rgba(10,70,30,0.55); }
    .card.c-green .card-art { background: linear-gradient(165deg,#052e16,#021208); }
    .card.c-green .card-body { border-left: 2px solid rgba(22,163,74,0.22); }
    .card.c-green .card-stats { background: rgba(34,197,94,0.08); }

    .card.c-cyan { background: linear-gradient(170deg,#03202b,#011018); border-color: rgba(34,211,238,0.35); }
    .card.c-cyan .card-header { background: linear-gradient(160deg,#22d3ee 0%,#0891b2 52%,#0a5e78 100%); border-top: 2px solid rgba(103,232,249,0.6); border-bottom: 1px solid rgba(5,65,85,0.55); }
    .card.c-cyan .card-art { background: linear-gradient(165deg,#042f3a,#021820); }
    .card.c-cyan .card-body { border-left: 2px solid rgba(8,145,178,0.22); }
    .card.c-cyan .card-stats { background: rgba(34,211,238,0.08); }

    .card.c-yellow { background: linear-gradient(170deg,#261305,#120902); border-color: rgba(234,179,8,0.35); }
    .card.c-yellow .card-header { background: linear-gradient(160deg,#fbbf24 0%,#d97706 52%,#92400e 100%); border-top: 2px solid rgba(253,230,138,0.65); border-bottom: 1px solid rgba(100,45,5,0.55); }
    .card.c-yellow .card-art { background: linear-gradient(165deg,#2d1506,#160a02); }
    .card.c-yellow .card-body { border-left: 2px solid rgba(180,83,9,0.22); }
    .card.c-yellow .card-stats { background: rgba(234,179,8,0.08); }

    /* Earth card themes */
    .card.e-safe { background: linear-gradient(170deg,#041f0e,#010e06); border-color: rgba(74,222,128,0.4); }
    .card.e-safe .card-header { background: linear-gradient(160deg,#4ade80 0%,#16a34a 52%,#0f6130 100%); border-top: 2px solid rgba(134,239,172,0.6); border-bottom: 1px solid rgba(10,70,30,0.55); }
    .card.e-safe .card-art { background: linear-gradient(165deg,#052e16,#021208); }
    .card.e-safe .card-body { border-left: 2px solid rgba(74,222,128,0.28); }

    .card.e-warm { background: linear-gradient(170deg,#2d1203,#160901); border-color: rgba(251,146,60,0.45); }
    .card.e-warm .card-header { background: linear-gradient(160deg,#fb923c 0%,#ea580c 52%,#9a3412 100%); border-top: 2px solid rgba(253,186,116,0.6); border-bottom: 1px solid rgba(100,40,10,0.55); }
    .card.e-warm .card-art { background: linear-gradient(165deg,#431407,#200a03); }
    .card.e-warm .card-body { border-left: 2px solid rgba(251,146,60,0.28); }

    .card.e-recess { background: linear-gradient(170deg,#180a38,#0d041e); border-color: rgba(168,85,247,0.4); }
    .card.e-recess .card-header { background: linear-gradient(160deg,#a855f7 0%,#7c3aed 52%,#5b21b6 100%); border-top: 2px solid rgba(216,180,254,0.6); border-bottom: 1px solid rgba(70,20,150,0.55); }
    .card.e-recess .card-art { background: linear-gradient(165deg,#2e1065,#140430); }
    .card.e-recess .card-body { border-left: 2px solid rgba(168,85,247,0.28); }

    .card.e-storm { background: linear-gradient(170deg,#131c28,#090f17); border-color: rgba(148,163,184,0.38); }
    .card.e-storm .card-header { background: linear-gradient(160deg,#94a3b8 0%,#64748b 52%,#334155 100%); border-top: 2px solid rgba(203,213,225,0.6); border-bottom: 1px solid rgba(30,40,55,0.55); }
    .card.e-storm .card-art { background: linear-gradient(165deg,#1e2d40,#0c1520); }
    .card.e-storm .card-body { border-left: 2px solid rgba(148,163,184,0.28); }

    .card.e-tax { background: linear-gradient(170deg,#221302,#110901); border-color: rgba(234,179,8,0.4); }
    .card.e-tax .card-header { background: linear-gradient(160deg,#fbbf24 0%,#d97706 52%,#92400e 100%); border-top: 2px solid rgba(253,230,138,0.6); border-bottom: 1px solid rgba(100,45,5,0.55); }
    .card.e-tax .card-art { background: linear-gradient(165deg,#3d1f05,#1e0f02); }
    .card.e-tax .card-body { border-left: 2px solid rgba(234,179,8,0.28); }

    .card.e-war { background: linear-gradient(170deg,#3d0a0a,#1c0404); border-color: rgba(239,68,68,0.55); box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 18px rgba(239,68,68,0.18); }
    .card.e-war .card-header { background: linear-gradient(160deg,#f87171 0%,#dc2626 52%,#991b1b 100%); border-top: 2px solid rgba(252,165,165,0.6); border-bottom: 1px solid rgba(127,29,29,0.55); }
    .card.e-war .card-art { background: linear-gradient(165deg,#5c0f0f,#2d0606); }
    .card.e-war .card-body { border-left: 2px solid rgba(239,68,68,0.32); }

    .card.e-collapse { background: linear-gradient(170deg,#0d0000,#000000); border-color: rgba(255,50,50,0.85); box-shadow: 0 6px 20px rgba(0,0,0,0.7), 0 0 28px rgba(220,0,0,0.4), 0 0 50px rgba(255,60,0,0.18); }
    .card.e-collapse .card-header { background: linear-gradient(160deg,#ef4444 0%,#b91c1c 52%,#7f1d1d 100%); border-top: 2px solid rgba(252,165,165,0.6); border-bottom: 1px solid rgba(100,10,10,0.55); }
    .card.e-collapse .card-art { background: linear-gradient(165deg,#200000,#000000); }
    .card.e-collapse .card-body { border-left: 2px solid rgba(255,50,50,0.38); }

    /* Card back */
    .card.c-back { background: linear-gradient(135deg,#1e1b4b,#312e81,#1e1b4b); border-color: rgba(99,102,241,0.35); align-items: center; justify-content: center; }
    .card.c-back::before { content:''; position:absolute; inset:7px; border:1px solid rgba(99,102,241,0.25); border-radius:7px; pointer-events:none; }
    .back-icon { font-size: 1.8rem; opacity: 0.35; } .back-label { font-size: 0.52rem; color: rgba(255,255,255,0.2); margin-top: 4px; }

    /* ── Field ── */
    .field { display: none; } .field.visible { display: block; }
    .field-label { text-align: center; font-size: 0.65rem; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .field-row { display: flex; gap: 16px; justify-content: center; align-items: flex-end; }
    .field-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .field-col .owner { font-size: 0.65rem; font-weight: 600; color: #52525b; }
    .field-col .owner.you { color: #4ade80; }

    /* ── Earth deck ── */
    .deck-area { display: flex; align-items: center; gap: 14px; }
    .deck-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .deck-stack { position: relative; width: 80px; height: 112px; }
    .deck-stack .card { position: absolute; width: 80px; height: 112px; }
    .deck-stack .card:nth-child(1) { transform: rotate(-3deg) translate(-2px,3px); }
    .deck-stack .card:nth-child(2) { transform: rotate(1.5deg) translate(1px,1px); }
    .deck-stack .card:nth-child(3) { transform: rotate(0deg); }
    .deck-count { font-size: 0.6rem; color: #52525b; }
    .earth-arrow { font-size: 1.3rem; color: rgba(255,255,255,0.2); }
    .earth-revealed { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .earth-revealed-lbl { font-size: 0.58rem; color: rgba(255,255,255,0.35); }
    .earth-revealed .card { width: 90px; height: 126px; }

    /* ── Hand ── */
    .hand-area { text-align: center; }
    .hand-lbl { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
    .hand { display: flex; gap: 10px; justify-content: center; align-items: flex-end; flex-wrap: wrap; padding: 0 8px 16px; }
    .hand .card { cursor: pointer; transform-origin: bottom center; }
    .hand .card:hover { transform: translateY(-18px) scale(1.07); z-index: 10; box-shadow: 0 18px 30px rgba(0,0,0,0.6), 0 0 20px rgba(255,255,255,0.08); }
    .hand .card.sel { transform: translateY(-24px) scale(1.09); z-index: 10; }
    .hand .card.sel.c-red    { border-color:#f87171; box-shadow:0 16px 30px rgba(239,68,68,0.5),0 0 20px rgba(239,68,68,0.3); }
    .hand .card.sel.c-blue   { border-color:#60a5fa; box-shadow:0 16px 30px rgba(59,130,246,0.5),0 0 20px rgba(59,130,246,0.3); }
    .hand .card.sel.c-green  { border-color:#4ade80; box-shadow:0 16px 30px rgba(34,197,94,0.5),0 0 20px rgba(34,197,94,0.3); }
    .hand .card.sel.c-cyan   { border-color:#22d3ee; box-shadow:0 16px 30px rgba(34,211,238,0.5),0 0 20px rgba(34,211,238,0.3); }
    .hand .card.sel.c-yellow { border-color:#facc15; box-shadow:0 16px 30px rgba(234,179,8,0.5),0 0 20px rgba(234,179,8,0.3); }

    /* ── Actions ── */
    .actions { display: flex; gap: 10px; justify-content: center; }
    .btn { padding: 10px 28px; border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-go { background: linear-gradient(135deg,#15803d,#166534); color:#fff; border:1px solid rgba(74,222,128,0.25); box-shadow:0 4px 12px rgba(22,163,74,0.35); }
    .btn-go:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(22,163,74,0.5); }
    .btn-go:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-re { background: rgba(255,255,255,0.07); color: #71717a; border: 1px solid rgba(255,255,255,0.09); }
    .btn-re:hover { background: rgba(255,255,255,0.12); color: #a1a1aa; }

    /* ── Log ── */
    .log { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; max-height: 100px; overflow-y: auto; }
    .log h3 { font-size: 0.62rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
    .log-e { font-size: 0.67rem; padding: 2px 0; color: rgba(255,255,255,0.45); border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-e.ev { color: #fbbf24; } .log-e.bad { color: #f87171; } .log-e.ok { color: #4ade80; }

    /* ── Overlays ── */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:90; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
    .overlay.show { display: flex; }
    .panel { background:#111827; border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:26px; text-align:center; min-width:240px; }
    .panel h3 { color:#fbbf24; margin-bottom:14px; font-size:.92rem; }
    .t-btn { display:block; width:100%; padding:10px; margin-bottom:7px; border:1px solid rgba(255,255,255,0.09); border-radius:8px; background:rgba(255,255,255,0.04); color:#d4d4d8; font-size:.85rem; cursor:pointer; transition:all .2s; }
    .t-btn:hover { background:rgba(251,191,36,0.12); border-color:rgba(251,191,36,0.4); color:#fbbf24; }
    .modal { background:#111827; border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:36px; text-align:center; max-width:420px; }
    .modal h2 { font-size:1.5rem; margin-bottom:8px; } .modal p { color:#71717a; margin-bottom:22px; line-height:1.75; font-size:.88rem; }

    /* ── Animations ── */
    @keyframes cardIn { from { opacity:0; transform:translateY(20px) scale(0.88); } to { opacity:1; transform:none; } }
    .card-anim { animation: cardIn 0.3s ease-out; }
    /* ── Card info panel ── */
    .card-info { min-height: 44px; text-align: center; padding: 6px 16px; background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; }
    .card-info-name { font-size: 0.72rem; font-weight: 700; color: #a1a1aa; margin-bottom: 2px; }
    .card-info-desc { font-size: 0.65rem; color: rgba(255,255,255,0.38); line-height: 1.5; }

    @media(max-width:640px){
      .card{width:95px;height:133px;} .card-art{height:40px;} .players{flex-wrap:wrap;} .p-card{min-width:100px;padding:8px 12px;}
    }
  </style>
</head>
<body>

<header>
  <h1>♠ デカップリングチャレンジ ♠</h1>
  <div class="chip">ラウンド <b id="rnd">1</b> / 5</div>
  <div class="chip">山札 <b id="dLeft">50</b> 枚</div>
</header>

<div class="game">
  <div class="players" id="pRow"></div>

  <div class="board-center">
    <div class="field" id="fieldArea">
      <div class="field-label">場に出たカード</div>
      <div class="field-row" id="fieldRow"></div>
    </div>
    <div class="deck-area">
      <div class="deck-wrap">
        <div class="deck-stack">
          <div class="card c-back"><div class="back-icon">🌍</div><div class="back-label">地球カード</div></div>
          <div class="card c-back"><div class="back-icon">🌍</div><div class="back-label">地球カード</div></div>
          <div class="card c-back"><div class="back-icon">🌍</div><div class="back-label">地球カード</div></div>
        </div>
        <div class="deck-count">地球カード 残り <span id="eLeft">19</span> 枚</div>
      </div>
      <div class="earth-arrow" id="earthArrow" style="visibility:hidden">→</div>
      <div class="earth-revealed" id="earthLast"></div>
    </div>
  </div>

  <div class="hand-area">
    <div class="hand-lbl" id="hLbl">カードを1枚選んでください</div>
    <div class="hand" id="hCards"></div>
  </div>

  <div class="actions">
    <button class="btn btn-go" id="goBtn" disabled onclick="go()">カードを出す</button>
    <button class="btn btn-re" onclick="init()">リスタート</button>
  </div>

  <div class="card-info" id="cardInfo">
    <div class="card-info-name" id="cardInfoName"></div>
    <div class="card-info-desc" id="cardInfoDesc">カードにカーソルを合わせると説明が表示されます</div>
  </div>

function mkDeck(){
  const counts={coal:4,gas:6,ren:4,grn:4,env:4,sav:3,elec:2,ppa:3,batt:2,circ:2,lc:1,sup:1,meth:1,tec:6,trd:7,hp:2,ccs:1,gh:2,cp:2,ctaxp:2,esg:3};
  const d=[];
  for(const[k,n]of Object.entries(counts))for(let i=0;i<n;i++)d.push(k);
  return shuf(d);
}
function mkEarth(){
  const d=['collapse','safe','safe','safe','safe','safe','safe','safe','safe','safe','safe','warm','warm','recess','recess','storm','storm','tax','war'];
  return shuf(d);
}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function mkCardHTML(cid){

/* ─── State ─── */
let S,sel,tgt;

function init(){
  document.getElementById('endOv').classList.remove('show');
  S={rnd:1,max:5,deck:mkDeck(),earth:mkEarth(),eDrawn:0,over:false,
    lastPlayed:null,lastEarth:null,
    ps:[
      {n:'あなた', ec:10,co:0,h:[],human:true, dead:false,lastCard:null,bonus:false},
      {n:'CPU-A',  ec:10,co:0,h:[],human:false,dead:false,lastCard:null,bonus:false},
      {n:'CPU-B',  ec:10,co:0,h:[],human:false,dead:false,lastCard:null,bonus:false},
    ],log:[]};
  sel=-1;tgt=-1;
  initialDeal();
  addL('ゲーム開始！経済を維持しつつCO₂を抑えよう','');
  draw();
}

function drawCard(){ return S.deck.length?S.deck.pop():null; }
function initialDeal(){ for(const p of S.ps)for(let i=0;i<3;i++){const c=drawCard();if(c)p.h.push(c);} }
function deal(){
  for(const p of S.ps){
    if(p.dead)continue;
    const sz=p.bonus?2:1;p.bonus=false;
    for(let i=0;i<sz;i++){const c=drawCard();if(c)p.h.push(c);}
  }
}

function aiPick(p){
  let best=0,bestS=-999;
  p.h.forEach((cid,i)=>{
    const c=C[cid];let s=0;
    const nEc=p.ec+c.ec,nCo=p.co+c.co;
    if(nEc<=0)s=-100;else if(nCo>=10)s=-100;
    else{s=(c.ec-c.co)*2;if(nEc<=3)s+=c.ec*3;if(nCo>=7)s-=c.co*4;if(c.co<0&&c.ec>=0)s+=5;}
    if(s>bestS){bestS=s;best=i;}
  });
  return best;
}
function aiTgt(idx){
  let t=-1,hi=-Infinity;
  S.ps.forEach((p,i)=>{if(i!==idx&&!p.dead){const sc=p.ec-p.co;if(sc>hi){hi=sc;t=i;}}});
  return t;
}

function go(){
  if(S.over||sel<0)return;
  const human=S.ps[0];
  const cid=human.h[sel];
  if(cid==='trd'&&tgt<0){showTgt();return;}
  addL(`── ラウンド ${S.rnd} ──`,'');
  const picks=[];
  for(let i=0;i<S.ps.length;i++){
    const p=S.ps[i];
    if(p.dead){picks.push(null);continue;}
    if(p.human)picks.push({ci:sel,tgt});
    else picks.push({ci:aiPick(p),tgt:aiTgt(i)});
  }
  S.lastPlayed=[];
  for(let i=0;i<S.ps.length;i++){
    const p=S.ps[i];
    if(p.dead||!picks[i]){S.lastPlayed.push(null);continue;}
    const cid=p.h[picks[i].ci];
    const c=C[cid];
    p.h.splice(picks[i].ci,1);
    p.ec+=c.ec; p.co=Math.max(0,p.co+c.co);
    p.lastCard=cid; S.lastPlayed.push(cid);
    if(cid==='tec')p.bonus=true;
    let msg=`${p.n}: ${c.n}（経済${c.ec>=0?'+':''}${c.ec}, CO₂${c.co>=0?'+':''}${c.co}）`;
    if(cid==='trd'){const t=S.ps[picks[i].tgt];if(t&&!t.dead){t.co+=2;msg+=` → ${t.n}にCO₂+2`;}}
    msg+=` → 経済${p.ec} CO₂${p.co}`;
    addL(msg,c.co<0?'ok':'');
  }
  sel=-1;tgt=-1;
  for(const p of S.ps){if(p.dead)continue;if(p.ec<=0){p.dead=true;addL(`💀 ${p.n}: 経済破綻で脱落`,'bad');}else if(p.co>=10){p.dead=true;addL(`💀 ${p.n}: 環境破綻で脱落`,'bad');}}
  if(checkAllDead())return;
  S.lastEarth=null;
  if(S.earth.length>0){
    S.eDrawn++;const e=S.earth.pop();S.lastEarth=e;
    if(e==='collapse'){addL('💥 地球崩壊！！ 全員敗北！！！','bad');S.ps.forEach(p=>{p.dead=true;});endG('collapse');return;}
    else if(e==='warm'){S.ps.forEach(p=>{if(!p.dead)p.co+=2;});addL('🌍 温暖化: 全員CO₂+2','ev');}
    else if(e==='recess'){S.ps.forEach(p=>{if(!p.dead)p.ec-=2;});addL('🌍 不況: 全員 経済-2','ev');}
    else if(e==='storm'){S.ps.forEach(p=>{if(!p.dead){p.co+=1;p.ec-=1;}});addL('🌍 異常気象: 全員 CO₂+1 & 経済-1','ev');}
    else if(e==='tax'){let mx=-1,ts=[];S.ps.forEach((p,i)=>{if(!p.dead){if(p.co>mx){mx=p.co;ts=[i];}else if(p.co===mx)ts.push(i);}});ts.forEach(i=>S.ps[i].co+=3);addL(`🌍 炭素税: ${ts.map(i=>S.ps[i].n).join('、')}にCO₂+3`,'ev');}
    else if(e==='war'){let mxE=-Infinity,mnE=Infinity,hiIs=[],loIs=[];S.ps.forEach((p,i)=>{if(!p.dead){if(p.ec>mxE){mxE=p.ec;hiIs=[i];}else if(p.ec===mxE)hiIs.push(i);if(p.ec<mnE){mnE=p.ec;loIs=[i];}else if(p.ec===mnE)loIs.push(i);}});hiIs.forEach(i=>S.ps[i].ec-=3);loIs.forEach(i=>S.ps[i].ec+=3);addL(`⚔️ 戦争: ${hiIs.map(i=>S.ps[i].n).join('、')}経済-3 ／ ${loIs.map(i=>S.ps[i].n).join('、')}経済+3`,'ev');}
    for(const p of S.ps){if(p.dead)continue;if(p.ec<=0){p.dead=true;addL(`💀 ${p.n}: 経済破綻で脱落`,'bad');}else if(p.co>=10){p.dead=true;addL(`💀 ${p.n}: 環境破綻で脱落`,'bad');}}
    if(checkAllDead())return;
  }
  if(S.rnd>=S.max){endG('end');return;}
  S.rnd++;deal();draw();
}

function checkAllDead(){
  if(S.ps.every(p=>p.dead)){addL('全員脱落 → 全員敗北','bad');endG('allDead');return true;}
  return false;
}
function showTgt(){
  const ov=document.getElementById('tgtOv'),el=document.getElementById('tgtBtns');
  el.innerHTML='';
  S.ps.forEach((p,i)=>{
    if(i===0||p.dead)return;
    const b=document.createElement('button');b.className='t-btn';
    b.textContent=`${p.n}（経済${p.ec} CO₂${p.co}）`;
    b.onclick=()=>{tgt=i;ov.classList.remove('show');go();};
    el.appendChild(b);
  });
  ov.classList.add('show');
}
function endG(r){
  S.over=true;draw();
  const t=document.getElementById('mT'),p=document.getElementById('mP');
  if(r==='collapse'){t.textContent='💥 地球崩壊...';t.style.color='#ff4040';p.innerHTML='地球が崩壊しました。<br>誰も生き残れませんでした。<br><br><span style="font-size:.8rem;color:#71717a">環境問題を無視した代償です。</span>';}
  else if(r==='allDead'){t.textContent='全員敗北...';t.style.color='#f87171';p.innerHTML='全員脱落しました。';}
  else{
    const alive=S.ps.filter(x=>!x.dead);
    const score=x=>x.ec-x.co;
    const sorted=[...alive].sort((a,b)=>score(b)-score(a));
    const w=sorted[0];
    const scores=S.ps.map(x=>`${x.n}: 経済${x.ec} CO₂${x.co}　スコア${score(x)}${x.dead?' (脱落)':''}`).join('<br>');
    if(w.human){t.textContent='勝利！';t.style.color='#4ade80';p.innerHTML=`スコア${score(w)}（経済${w.ec} − CO₂${w.co}）でデカップリング達成！<br><br>${scores}`;}
    else if(alive.length>1&&score(sorted[0])===score(sorted[1])&&sorted.some(x=>x.human)){t.textContent='引き分け！';t.style.color='#fbbf24';p.innerHTML=scores;}
    else{t.textContent='敗北...';t.style.color='#f87171';p.innerHTML=`${w.n}がスコア${score(w)}で勝利<br><br>${scores}`;}
  }
  document.getElementById('endOv').classList.add('show');
}

function draw(){
  document.getElementById('rnd').textContent=S.rnd;
  document.getElementById('dLeft').textContent=S.deck.length;
  document.getElementById('eLeft').textContent=S.earth.length;

  const row=document.getElementById('pRow');row.innerHTML='';
  S.ps.forEach(p=>{
    const d=document.createElement('div');
    d.className='p-card'+(p.human?' you':'')+(p.dead?' dead':'');
    const ecC=p.ec<=3?'#f87171':p.ec<=6?'#fbbf24':'#4ade80';
    const coC=p.co>=8?'#f87171':p.co>=5?'#fbbf24':'#4ade80';
    d.innerHTML=`<div class="p-name">${p.n}${p.dead?' (脱落)':''}</div>
      <div class="p-stats">
        <div class="p-stat"><div class="label">経済</div><div class="val" style="color:${ecC}">${p.ec}</div></div>
        <div class="p-stat"><div class="label">CO₂</div><div class="val" style="color:${coC}">${p.co}</div></div>
      </div>`;
    row.appendChild(d);
  });

  const fieldArea=document.getElementById('fieldArea');
  const fieldRow=document.getElementById('fieldRow');
  if(S.lastPlayed){
    fieldArea.classList.add('visible');fieldRow.innerHTML='';
    S.ps.forEach((p,i)=>{
      const col=document.createElement('div');col.className='field-col';
      const lbl=document.createElement('div');lbl.className='owner'+(p.human?' you':'');lbl.textContent=p.n;col.appendChild(lbl);
      const cid=S.lastPlayed[i];const card=document.createElement('div');
      if(cid){card.className=`card ${C[cid].cls} card-anim`;card.innerHTML=mkCardHTML(cid);}
      else{card.className='card c-back';card.style.opacity='.2';card.innerHTML='<div class="back-icon">—</div><div class="back-label">脱落</div>';}
      col.appendChild(card);fieldRow.appendChild(col);
    });
  }else{fieldArea.classList.remove('visible');}

  const earthArrow=document.getElementById('earthArrow');
  const earthLast=document.getElementById('earthLast');
  if(S.lastEarth){
    earthArrow.style.visibility='visible';earthLast.innerHTML='';
    const lbl=document.createElement('div');lbl.className='earth-revealed-lbl';lbl.textContent='今回の地球カード';earthLast.appendChild(lbl);
    const ec=document.createElement('div');ec.className=`card ${EARTH[S.lastEarth].cls} card-anim`;
    ec.innerHTML=mkEarthCardHTML(S.lastEarth);earthLast.appendChild(ec);
  }else{earthArrow.style.visibility='hidden';earthLast.innerHTML='';}

  const hEl=document.getElementById('hCards');hEl.innerHTML='';
  const lbl=document.getElementById('hLbl');
  const human=S.ps[0];
  if(S.over||human.dead){lbl.textContent='ゲーム終了';document.getElementById('goBtn').disabled=true;return;}
  lbl.textContent=`手札 ${human.h.length} 枚 — 1枚選んでカードを出す`;
  human.h.forEach((cid,i)=>{
    const c=C[cid];const d=document.createElement('div');
    d.className=`card ${c.cls}`+(i===sel?' sel':'');
    d.innerHTML=mkCardHTML(cid);
    d.onclick=()=>{if(S.over)return;sel=sel===i?-1:i;tgt=-1;draw();};
    d.onmouseenter=()=>showDesc(cid);
    d.onmouseleave=()=>hideDesc();
    hEl.appendChild(d);
  });
  document.getElementById('goBtn').disabled=sel<0||S.over;

  const logEl=document.getElementById('logEl');logEl.innerHTML='';
  S.log.forEach(e=>{const d=document.createElement('div');d.className='log-e'+(e.c?' '+e.c:'');d.textContent=e.t;logEl.appendChild(d);});
  logEl.scrollTop=logEl.scrollHeight;
}

function showDesc(cid){
  const c=C[cid];
  document.getElementById('cardInfoName').textContent=`${c.n}　[${c.cat}]`;
  document.getElementById('cardInfoDesc').textContent=c.desc||'';
}
function hideDesc(){
  document.getElementById('cardInfoName').textContent='';
  document.getElementById('cardInfoDesc').textContent='カードにカーソルを合わせると説明が表示されます';
}

function addL(t,c){S.log.push({t,c});}
init();
</script>
</body>
</html>
